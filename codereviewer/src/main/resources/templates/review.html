<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">
    <div class="card shadow">

        <div class="card-header bg-dark text-white text-center">
            <h3>Submitted Codes</h3>
        </div>

        <div class="card-body">

            <table class="table table-hover table-bordered text-center">
                <thead class="table-primary">
                <tr>
                    <th>Name</th>
                    <th>Language</th>
                    <th>Title</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
                </thead>

                <tbody>
                <tr th:each="s : ${list}">
                    <td th:text="${s.developerName}"></td>
                    <td th:text="${s.language}"></td>
                    <td th:text="${s.title}"></td>

                    <td>
                        <span class="badge bg-success" th:if="${s.reviewStatus=='Good'}">Good</span>
                        <span class="badge bg-warning" th:if="${s.reviewStatus=='Warning'}">Warning</span>
                        <span class="badge bg-danger" th:if="${s.reviewStatus=='Poor'}">Poor</span>
                    </td>

                    <td>
                        <a th:href="@{/view/{id}(id=${s.id})}" class="btn btn-info btn-sm">View</a>
                        <a th:href="@{/edit/{id}(id=${s.id})}" class="btn btn-warning btn-sm">Edit</a>
                        <a th:href="@{/delete/{id}(id=${s.id})}" class="btn btn-danger btn-sm">Delete</a>
                    </td>
                </tr>
                </tbody>

            </table>

            <div class="text-center">
                <a href="/" class="btn btn-secondary">Back</a>
            </div>

        </div>
    </div>
</div>

</body>
</html>
