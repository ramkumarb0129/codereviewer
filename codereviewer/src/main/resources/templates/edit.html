<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Edit Code</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom Style -->
    <style>
        body {
            background: linear-gradient(to right, #4facfe, #00f2fe);
        }

        .card {
            border-radius: 15px;
        }

        .form-control:focus {
            box-shadow: none;
            border-color: #4facfe;
        }

        textarea {
            font-family: monospace;
        }
    </style>
</head>

<body>

<div class="container mt-5">
    <div class="row justify-content-center">

        <div class="col-md-8">
            <div class="card shadow-lg">

                <!-- Header -->
                <div class="card-header bg-dark text-white text-center">
                    <h3>✏️ Edit Code Submission</h3>
                </div>

                <!-- Body -->
                <div class="card-body p-4">

                    <form th:action="@{/edit/{id}(id=${code.id})}" method="post">

                        <!-- Developer Name -->
                        <div class="mb-3">
                            <label class="form-label fw-bold">Developer Name</label>
                            <input type="text" name="developerName"
                                   class="form-control"
                                   th:value="${code.developerName}" required>
                        </div>

                        <!-- Language -->
                        <div class="mb-3">
                            <label class="form-label fw-bold">Programming Language</label>
                            <select name="language" class="form-select">
                                <option th:selected="${code.language == 'Java'}">Java</option>
                                <option th:selected="${code.language == 'Python'}">Python</option>
                                <option th:selected="${code.language == 'C++'}">C++</option>
                                <option th:selected="${code.language == 'JavaScript'}">JavaScript</option>
                            </select>
                        </div>

                        <!-- Title -->
                        <div class="mb-3">
                            <label class="form-label fw-bold">Code Title</label>
                            <input type="text" name="title"
                                   class="form-control"
                                   th:value="${code.title}" required>
                        </div>

                        <!-- Code Area -->
                        <div class="mb-3">
                            <label class="form-label fw-bold">Code Snippet</label>
                            <textarea name="code" rows="8"
                                      class="form-control"
                                      th:text="${code.code}"></textarea>
                        </div>

                        <!-- Buttons -->
                        <div class="d-flex justify-content-between">

                            <a href="/reviews" class="btn btn-secondary">
                                ⬅ Back
                            </a>

                            <button type="submit" class="btn btn-success px-4">
                                💾 Save Changes
                            </button>

                        </div>

                    </form>

                </div>

            </div>
        </div>

    </div>
</div>

</body>
</html>
