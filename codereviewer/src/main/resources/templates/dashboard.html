<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Code Reviewer</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom Style -->
    <style>
        body {
            background: linear-gradient(to right, #4facfe, #00f2fe);
        }

        .card {
            border-radius: 15px;
        }

        .form-control:focus, .form-select:focus {
            box-shadow: none;
            border-color: #4facfe;
        }

        textarea {
            font-family: monospace;
        }
    </style>
</head>

<body>

<div class="container mt-5">
    <div class="row justify-content-center">

        <div class="col-md-8">

            <div class="card shadow-lg">

                <!-- Header -->
                <div class="card-header bg-primary text-white text-center">
                    <h3>🚀 Code Submission Portal</h3>
                </div>

                <!-- Body -->
                <div class="card-body p-4">

                    <!-- 🔴 Error Message -->
                    <div th:if="${error}" class="alert alert-danger text-center">
                        <span th:text="${error}"></span>
                    </div>

                    <!-- FORM -->
                    <form action="/submit" method="post" onsubmit="return validateForm()">

                        <!-- Developer Name -->
                        <div class="mb-3">
                            <label class="form-label fw-bold">Developer Name</label>
                            <input type="text" name="developerName" class="form-control" placeholder="Enter your name" required>
                        </div>

                        <!-- Language -->
                        <div class="mb-3">
                            <label class="form-label fw-bold">Programming Language</label>
                            <select name="language" class="form-select">
                                <option value="Java">Java</option>
                                <option value="Python">Python</option>
                                <option value="C++">C++</option>
                                <option value="JavaScript">JavaScript</option>
                            </select>
                        </div>

                        <!-- Title -->
                        <div class="mb-3">
                            <label class="form-label fw-bold">Code Title</label>
                            <input type="text" name="title" class="form-control" placeholder="Enter code title" required>
                        </div>

                        <!-- Code -->
                        <div class="mb-3">
                            <label class="form-label fw-bold">Code</label>
                            <textarea name="code" rows="6" class="form-control" placeholder="Paste your code here..." required></textarea>
                        </div>

                        <!-- Submit -->
                        <button type="submit" class="btn btn-success w-100">
                            ✅ Submit Code
                        </button>

                    </form>

                    <!-- Navigation -->
                    <div class="text-center mt-3">
                        <a href="/reviews" class="btn btn-outline-dark">
                            📄 View Submissions
                        </a>
                    </div>

                </div>

            </div>

        </div>

    </div>
</div>

<!-- 🔥 Validation Script -->
<script>
    function validateForm() {
        let name = document.getElementsByName("developerName")[0].value.trim();
        let title = document.getElementsByName("title")[0].value.trim();
        let code = document.getElementsByName("code")[0].value.trim();

        if (name === "" || title === "" || code === "") {
            alert("All fields are required!");
            return false;
        }

        return true;
    }
</script>

</body>
</html>
